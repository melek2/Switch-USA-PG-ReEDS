%YAML 1.2
---
# File was generated by pg/SettingsBuilder.ipynb on 2026/04/23 09:06.
# NOTE: Comments in this file were copied from the reference settings and
# may not fully reflect the current content, some values and flags have
# been changed by the notebook. Treat inline comments as context from the
# original reference, not as authoritative documentation of this file.
eia_data_years:
  - 2024

# Get more recent status info for existing generators. The file below will be
# automatically downloaded from https://www.eia.gov/electricity/data/eia860m/
# (xls/ or archive/xls/) and cached within the powergenome installation. If you
# change this setting, you should run `update_coal_closures.py` before running
# PowerGenome.
eia_860m_fn: july_generator2025.xlsx

# Global Energy Monitor, Global Coal Plant Tracker, July 2025 release.
# (released under CC-By 4.0)
# See https://globalenergymonitor.org/projects/global-coal-plant-tracker/download-data/
GEM_coal_tracker_fn: Global-Coal-Plant-Tracker-July-2025.xlsx

# CAPACITY TYPE
capacity_col: winter_capacity_mw

# CLUSTERING
# Existing thermal power plants are clustered to reduce the number of distinct plants.
# The existing method (for now) is to specify the number of clusters for each type
# of thermal plant as a default and then specify specific values for any regions
# that are different.

# Include units with planned/age-based retirements when determining clusters across periods
cluster_with_retired_gens: true

# ** Any technologies not included in num_clusters will be omitted **
num_clusters:
  Conventional Steam Coal: ~
  Natural Gas Fired Combined Cycle: ~
  Natural Gas Fired Combustion Turbine: ~
  Nuclear: 1
  Conventional Hydroelectric: 1
  Solar Photovoltaic: 1
  Onshore Wind Turbine: 1
  Batteries: 1
  Natural Gas Internal Combustion Engine: ~
  Petroleum Liquids: ~
  Hydroelectric Pumped Storage: 1
  Small Hydroelectric: 1
  Geothermal: 1
  Biomass: ~
  Offshore Wind Turbine: 1
group_technologies: true
tech_groups:
  Biomass:
    - Wood/Wood Waste Biomass
    - Landfill Gas
    - Municipal Solid Waste
    - Other Waste Biomass
  Other_peaker:
    - Natural Gas Internal Combustion Engine
    - Petroleum Liquids
regional_no_grouping: ~

# Add code to ensure region names here are included above
alt_num_clusters: ~

# Derate the capacity of technologies that will be set as MUST_RUN in GenX by their
# historical capacity factor.
derate_techs:
  - Small Hydroelectric
  - Biomass

# Default value to limit the years used to calculate capacity factors.
# PUDL currently has generation data from 2011 through the most recent final release of 923/860.
capacity_factor_default_year_filter: [2016, 2017, 2018, 2019, 2020, 2021, 2022, 
      2023, 2024]

# LABEL SMALL HYDRO
small_hydro: true
small_hydro_mw: 30
small_hydro_regions:
  - WA_and_OR
  - NV_and_UT_and_n_CA
  - Bay_area
  - LAX
  - San_Diego
  - ID_and_w_MT_and_w_WY
  - e_WY_and_w_SD
  - AZ
  - NM_and_w_TX
  - CO
  - NE_and_e_SD_and_w_ND_and_e_MT
  - MN_and_e_ND
  - IA
  - WI_and_w_MI
  - OK_and_e_NM_and_nw_TX
  - KS_and_w_MO
  - LA_and_e_TX
  - w_TX_ERCOT
  - e_Texas_ERCOT
  - Houston_ERCOT
  - e_MO
  - Chicago_and_sw_MI
  - IL_no_Chicago
  - e_AR_and_w_MS
  - AL_and_e_MS_and_FL_pnh
  - TN_and_s_KY
  - GA
  - SC
  - NC
  - VA
  - Central_FL
  - se_FL
  - MI
  - IN_and_W_KY
  - n_KY
  - OH
  - PA
  - WV
  - MD_and_VA_Island
  - DE_and_NJ
  - NY
  - New_York_City
  - VT_and_NH
  - MA
  - CT_and_RT
  - ME
hydro_factor: 2

regional_hydro_factor:
  WA_and_OR: 4
energy_storage_duration:
  Hydroelectric Pumped Storage: 15.5
  Batteries: 2
atb_existing_year: 2024

resource_attr_modifiers:
  conventional steam coal:
    - attribute: fom_per_mwyr
      formula:
        op: add
        rate: 126 # 0.126 $/kW-yr per year of age
        multiplier: age

#####################
# New-build generators
#####################

# Filters for generator cost data from NREL ATB (ATB data from technology_costs_nrelatb table in PG_DB)
atb_data_year: 2024
atb_financial_case: Market
atb_cap_recovery_years: 20

# next 3 are unused?
# resource_data_year: 2024
# resource_financial_case: Market
# resource_cap_recovery_years: 30

# Alternate capital recovery periods for specific technologies, which are used to calculate
# the annual investment costs. The names are matched using str.contains rather than
# exact matches. Set parameter value to none (~) if not used.
alt_atb_cap_recovery_years:
  Battery: 15
  Nuclear: 40

alt_resource_cap_recovery_years:
  Battery: 15
  Nuclear: 40

# Use Class3 onshore wind, Class 3 for fixed offshore wind, and Class 12 for floating offshore wind
# Format for each list item is <technology>, <tech_detail>, <cost_case>, <size>
# We use Moderate case for most technologies but Advanced case for batteries because prices have
# moved quickly since ATB 2024.
# These settings are for 2035 and later; also see scenario_management.yml for
# more restricted versions for earlier years (no new floating wind before 2030
# or nuclear before 2035)
atb_new_gen:
  -   - UtilityPV
      - Class1
      - Moderate
      - 100
  -   - Nuclear
      - Nuclear - Large
      - Moderate
      - 1000
  -   - Utility-Scale Battery Storage
      - Lithium Ion
      - Moderate
      - 60
  -   - Biopower
      - Dedicated
      - Moderate
      - 50
  -   - Coal
      - IGCC
      - Moderate
      - 641
  -   - Coal
      - IGCC-90%-CCS
      - Moderate
      - 100
  -   - Geothermal
      - HydroBinary
      - Moderate
      - 100
  -   - LandbasedWind
      - Class4
      - Moderate
      - 200
  -   - NaturalGas
      - 2-on-1 Combined Cycle (H-Frame)
      - Moderate
      - 992
  -   - NaturalGas
      - 2-on-1 Combined Cycle (H-Frame) 95% CCS
      - Moderate
      - 877
  -   - NaturalGas
      - Combustion Turbine (F-Frame)
      - Moderate
      - 233
  -   - OffShoreWind
      - Class3
      - Moderate
      - 500
  -   - OffShoreWind
      - Class12
      - Moderate
      - 500
renewables_clusters:
  - region: all
    technology: landbasedwind
    cluster:
      - feature: cf
        n_clusters: 9
        method: agg
  - region: all
    technology: utilitypv
    cluster:
      - feature: cf
        n_clusters: 9
        method: agg
  - region: all
    technology: offshorewind
    turbine_type: fixed
    pref_site: 1
    cluster:
      - feature: cf
        n_clusters: 2
        method: agg
  - region: all
    technology: offshorewind
    turbine_type: fixed
    pref_site: 0
    cluster:
      - feature: cf
        n_clusters: 2
        method: agg
  - region: all
    technology: offshorewind
    turbine_type: floating
    pref_site: 0
    cluster:
      - feature: cf
        n_clusters: 2
        method: agg
  - region: all
    technology: imports
shorten_cluster_cache_paths: true

# The atb_modifers parameter is used here to Operators ("add", "mul", "truediv",
# and "sub") can only be used to modify values that exist in the ATB database
# (try `select distinct param technology_costs_nrelatb;` in the database pointed
# to by PG_DB setting). Values that are not part of the ATB database the value
# should be set directly rather than using a list of [operator, value].
atb_modifiers:
  utilitypv_class1:
    technology: UtilityPV
    tech_detail: Class1
  nuclear_nuclear_large:
    technology: Nuclear
    tech_detail: Nuclear - Large
  utility_scale_battery_storage_lithium_ion:
    technology: Utility-Scale Battery Storage
    tech_detail: Lithium Ion
    Var_OM_Cost_per_MWh: 0.15
    Var_OM_Cost_per_MWh_In: 0.15
  biopower_dedicated:
    technology: Biopower
    tech_detail: Dedicated
  coal_igcc:
    technology: Coal
    tech_detail: IGCC
  coal_igcc_90_ccs:
    technology: Coal
    tech_detail: IGCC-90%-CCS
  geothermal_hydrobinary:
    technology: Geothermal
    tech_detail: HydroBinary
  landbasedwind_class4:
    technology: LandbasedWind
    tech_detail: Class4
  naturalgas_2_on_1_combined_cycle_h_frame:
    technology: NaturalGas
    tech_detail: 2-on-1 Combined Cycle (H-Frame)
  naturalgas_2_on_1_combined_cycle_h_frame_95_ccs:
    technology: NaturalGas
    tech_detail: 2-on-1 Combined Cycle (H-Frame) 95% CCS
  naturalgas_combustion_turbine_f_frame:
    technology: NaturalGas
    tech_detail: Combustion Turbine (F-Frame)
  offshorewind_class3:
    technology: OffShoreWind
    tech_detail: Class3
  offshorewind_class12:
    technology: OffShoreWind
    tech_detail: Class12
modified_atb_new_gen:
  # Virtual generators to represent international imports to each zone (can't be
  # done by load adjustments because it sometimes results in negative zonal
  # totals). We treat these as free plants that can be build and used up to the
  # historical level but not further.
  # TODO: figure out how to avoid double-building these in different study periods
  # (may not be a problem, since the capacity limit gets pushed into gen_info.csv)
  # NOTE: there must not be underscores in the new_technology name, and if it
  # needs to have resource profiles, then there must be clusters in the
  # RESOURCE_GROUPS and RESOURCE_GROUP_PROFILES directories with the same
  # technology name, but lowercase and with spaces removed (or matchable via
  # powergenome.map_nrel_atb_technology())
  Imports:
    # Based on same PV as we use for standard work:
    # [UtilityPV, Class1, Moderate, 1]
    atb_technology: UtilityPV
    atb_tech_detail: Class1
    atb_cost_case: Moderate
    new_technology: Imports
    new_tech_detail: "base"
    new_cost_case: "base"
    size_mw: 500 # may not matter
    # zero out all costs
    capex_mw: 0
    fixed_o_m_mw: 0
    variable_o_m_mwh: 0

  # example
  # NGCCS100:
  #   new_technology: NaturalGas
  #   new_tech_detail: CCS100
  #   new_cost_case: Moderate
  #   atb_technology: NaturalGas
  #   atb_tech_detail: CCCCSAvgCF
  #   atb_cost_case: Conservative # ATB CCCCS conservative case represents current technology.
  #   size_mw: 500
  #   capex_mw: [add, 116000]
  #   heat_rate: [add, 0.365]
  #   fixed_o_m_mw: [add, 9670]
  #   variable_o_m_mwh: [mul, 1.076]

